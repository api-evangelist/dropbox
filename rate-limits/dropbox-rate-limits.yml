specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Dropbox
providerId: dropbox
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - File Storage
description: Dropbox API enforces per-app and per-user rate limits.
sources:
  - https://www.dropbox.com/plans
  - https://www.dropbox.com/developers/reference/data-ingress-guide
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Default per-app
    scope: app
    metric: requests_per_minute
    limit: 1200
    timeFrame: minute
    notes: Soft cap; varies by endpoint and account count.
  - name: Per-user write
    scope: user
    metric: concurrent_uploads
    limit: 100
    timeFrame: concurrent
  - name: List folder cursors
    scope: user
    metric: active_cursors
    limit: 100
