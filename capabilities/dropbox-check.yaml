naftiko: 1.0.0-alpha2
info:
  label: Dropbox API Reference — Check
  description: 'Dropbox API Reference — Check. 2 operations. Lead operation: Dropbox app. Self-contained Naftiko capability
    covering one Dropbox business surface.'
  tags:
  - Dropbox
  - Check
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DROPBOX_API_KEY: DROPBOX_API_KEY
capability:
  consumes:
  - type: http
    namespace: dropbox-check
    baseUri: https://api.dropbox.com
    description: Dropbox API Reference — Check business capability. Self-contained, no shared references.
    resources:
    - name: 2-check-app
      path: /2/check/app
      operations:
      - name: post
        method: POST
        description: Dropbox app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: 2-check-user
      path: /2/check/user
      operations:
      - name: post
        method: POST
        description: Dropbox user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Type
          in: header
          type: string
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.DROPBOX_API_KEY}}'
  exposes:
  - type: rest
    namespace: dropbox-check-rest
    port: 8080
    description: REST adapter for Dropbox API Reference — Check. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/2/check/app
      name: 2-check-app
      description: REST surface for 2-check-app.
      operations:
      - method: POST
        name: post
        description: Dropbox app
        call: dropbox-check.post
        with:
          Content-Type: rest.Content-Type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2/check/user
      name: 2-check-user
      description: REST surface for 2-check-user.
      operations:
      - method: POST
        name: post
        description: Dropbox user
        call: dropbox-check.post
        with:
          Content-Type: rest.Content-Type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dropbox-check-mcp
    port: 9090
    transport: http
    description: MCP adapter for Dropbox API Reference — Check. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: dropbox-app
      description: Dropbox app
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dropbox-check.post
      with:
        Content-Type: tools.Content-Type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: dropbox-user
      description: Dropbox user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dropbox-check.post
      with:
        Content-Type: tools.Content-Type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
