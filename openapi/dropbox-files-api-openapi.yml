paths:
  /2/files/copy_v2:
    post:
      tags:
      - Files
      summary: Dropbox copy
      description: '[copy](https://www.dropbox.com/developers/documentation/http/documentation#files-copy)


        scope: `files.content.write`


        Copy a file or folder to a different location in the user''s Dropbox.

        If the source path is a folder all its contents will be copied.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"from_path\": \"/Homework/math\", \n    \"to_path\": \"/Homework/algebra\", \n    \"allow_shared_folder\": false, \n    \"autorename\": false, \n    \"allow_ownership_transfer\": false\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                metadata:
                  .tag: file
                  name: Prime_Numbers.txt
                  id: id:a4ayc_80_OEAAAAAAAAAXw
                  client_modified: '2015-05-12T15:50:38Z'
                  server_modified: '2015-05-12T15:50:38Z'
                  rev: a1c10ce0dd78
                  size: 7212
                  path_lower: /homework/math/prime_numbers.txt
                  path_display: /Homework/math/Prime_Numbers.txt
                  sharing_info:
                    read_only: true
                    parent_shared_folder_id: '84528192421'
                    modified_by: dbid:AAH4f99T0taONIb-OurWxbNQ6ywGRopQngc
                  is_downloadable: true
                  property_groups:
                  - template_id: ptid:1a5n2i6d3OYEAAAAAAAAAYa
                    fields:
                    - name: Security Policy
                      value: Confidential
                  has_explicit_shared_members: false
