      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                access_type:
                  .tag: owner
                is_inside_team_folder: false
                is_team_folder: false
                name: dir
                policy:
                  acl_update_policy:
                    .tag: owner
                  shared_link_policy:
                    .tag: anyone
                  member_policy:
                    .tag: anyone
                  resolved_member_policy:
                    .tag: team
                preview_url: https://www.dropbox.com/scl/fo/fir9vjelf
                shared_folder_id: '84528192421'
                time_invited: '2016-01-20T00:00:00Z'
                path_lower: /dir
                link_metadata:
                  audience_options:
                  - .tag: public
                  - .tag: team
                  - .tag: members
                  current_audience:
                    .tag: public
                  link_permissions:
                  - action:
                      .tag: change_audience
                    allow: true
                  password_protected: false
                  url: ''
                permissions: []
                access_inheritance:
                  .tag: inherit
  /2/sharing/get_shared_link_file:
    post:
      tags:
      - Sharing
      summary: Dropbox get_shared_link_file
      description: '[get_shared_link_file](https://www.dropbox.com/developers/documentation/http/documentation#sharing-get_shared_link_file)


        scope: `sharing.read`


        Download the shared link''s file from a user''s Dropbox.      '
      parameters:
      - name: Dropbox-API-Arg
        in: header
        schema:
          type: string
        example: "{\n    \"url\": \"https://www.dropbox.com/s/2sn712vy1ovegw8/Prime_Numbers.txt?dl=0\", \n    \"path\": \"/Prime_Numbers.txt\"\n}"
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                .tag: file
                url: https://www.dropbox.com/s/2sn712vy1ovegw8/Prime_Numbers.txt?dl=0
                name: Prime_Numbers.txt
                link_permissions:
                  can_revoke: false
                  resolved_visibility:
                    .tag: public
                  revoke_failure_reason:
                    .tag: owner_only
                client_modified: '2015-05-12T15:50:38Z'
                server_modified: '2015-05-12T15:50:38Z'
                rev: a1c10ce0dd78
                size: 7212
                id: id:a4ayc_80_OEAAAAAAAAAXw
                path_lower: /homework/math/prime_numbers.txt
                team_member_info:
                  team_info:
                    id: dbtid:AAFdgehTzw7WlXhZJsbGCLePe8RvQGYDr-I
                    name: Acme, Inc.
                  display_name: Roger Rabbit
                  member_id: dbmid:abcd1234
  /2/sharing/get_shared_link_metadata:
    post:
      tags:
      - Sharing
      summary: Dropbox get_shared_link_metadata
      description: '[get_shared_link_metadata](https://www.dropbox.com/developers/documentation/http/documentation#sharing-get_shared_link_metadata)


        scope: `sharing.read`


        Get the shared link''s metadata.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"url\": \"https://www.dropbox.com/s/2sn712vy1ovegw8/Prime_Numbers.txt?dl=0\", \n    \"path\": \"/Prime_Numbers.txt\"\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                .tag: file
                url: https://www.dropbox.com/s/2sn712vy1ovegw8/Prime_Numbers.txt?dl=0
                name: Prime_Numbers.txt
                link_permissions:
                  can_revoke: false
                  resolved_visibility:
                    .tag: public
                  revoke_failure_reason:
                    .tag: owner_only
                client_modified: '2015-05-12T15:50:38Z'
                server_modified: '2015-05-12T15:50:38Z'
                rev: a1c10ce0dd78
                size: 7212
                id: id:a4ayc_80_OEAAAAAAAAAXw
                path_lower: /homework/math/prime_numbers.txt
                team_member_info:
                  team_info:
                    id: dbtid:AAFdgehTzw7WlXhZJsbGCLePe8RvQGYDr-I
                    name: Acme, Inc.
                  display_name: Roger Rabbit
                  member_id: dbmid:abcd1234
  /2/sharing/list_file_members:
    post:
      tags:
      - Sharing
      summary: Dropbox list_file_members
      description: '[list_file_members](https://www.dropbox.com/developers/documentation/http/documentation#sharing-list_file_members)


        scope: `sharing.read`


        Use to obtain the members who have been invited to a file, both inherited and uninherited members.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"file\": \"id:3kmLmQFnf1AAAAAAAAAAAw\", \n    \"include_inherited\": true, \n    \"limit\": 100\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                users:
                - access_type:
                    .tag: owner
                  user:
                    account_id: dbid:AAH4f99T0taONIb-OurWxbNQ6ywGRopQngc
                    email: bob@example.com
                    display_name: Robert Smith
                    same_team: true
                    team_member_id: dbmid:abcd1234
                  permissions: []
                  is_inherited: false
                  time_last_seen: '2016-01-20T00:00:00Z'
                  platform_type:
                    .tag: unknown
                groups:
                - access_type:
                    .tag: editor
                  group:
                    group_name: Test group
                    group_id: g:e2db7665347abcd600000000001a2b3c
                    group_management_type:
                      .tag: user_managed
                    group_type:
                      .tag: user_managed
                    is_member: false
                    is_owner: false
                    same_team: true
                    member_count: 10
                  permissions: []
                  is_inherited: false
                invitees:
                - access_type:
                    .tag: viewer
                  invitee:
                    .tag: email
                    email: jessica@example.com
                  permissions: []
                  is_inherited: false
  /2/sharing/list_file_members/batch:
    post:
      tags:
      - Sharing
      summary: Dropbox list_file_members/batch
      description: '[list_file_members/batch](https://www.dropbox.com/developers/documentation/http/documentation#sharing-list_file_members-batch)


        scope: `sharing.read`


        Get members of multiple files at once. The arguments to this route are more limited, and the limit on query result size per file is more strict. To customize the results more, use the individual file endpoint.

        Inherited users and groups are not included in the result, and permissions are not returned for this endpoint.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"files\": [\n        \"id:3kmLmQFnf1AAAAAAAAAAAw\", \n        \"id:VvTaJu2VZzAAAAAAAAAADQ\"\n    ], \n    \"limit\": 10\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
              - file: id:3kmLmQFnf1AAAAAAAAAAAw
                result:
                  .tag: result
                  members:
                    users:
                    - access_type:
                        .tag: owner
                      user:
                        account_id: dbid:AAH4f99T0taONIb-OurWxbNQ6ywGRopQngc
                        email: bob@example.com
                        display_name: Robert Smith
                        same_team: true
                        team_member_id: dbmid:abcd1234
                      permissions: []
                      is_inherited: false
                      time_last_seen: '2016-01-20T00:00:00Z'
                      platform_type:
                        .tag: unknown
                    groups:
                    - access_type:
                        .tag: editor
                      group:
                        group_name: Test group
                        group_id: g:e2db7665347abcd600000000001a2b3c
                        group_management_type:
                          .tag: user_managed
                        group_type:
                          .tag: user_managed
                        is_member: false
                        is_owner: false
                        same_team: true
                        member_count: 10
                      permissions: []
                      is_inherited: false
                    invitees:
                    - access_type:
                        .tag: viewer
                      invitee:
                        .tag: email
                        email: jessica@example.com
                      permissions: []
                      is_inherited: false
                  member_count: 3
  /2/sharing/list_file_members/continue:
    post:
      tags:
      - Sharing
      summary: Dropbox list_file_members/continue
      description: '[list_file_members/continue](https://www.dropbox.com/developers/documentation/http/documentation#sharing-list_file_members-continue)


        scope: `sharing.read`


        Once a cursor has been retrieved from `list_file_members` or `list_file_members/batch`, use this to paginate through all shared file members.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"cursor\": \"ZtkX9_EHj3x7PMkVuFIhwKYXEpwpLwyxp9vMKomUhllil9q7eWiAu\"\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                users:
                - access_type:
                    .tag: owner
                  user:
                    account_id: dbid:AAH4f99T0taONIb-OurWxbNQ6ywGRopQngc
                    email: bob@example.com
                    display_name: Robert Smith
