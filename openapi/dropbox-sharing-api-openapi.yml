    post:
      tags:
      - Sharing
      summary: Dropbox check_share_job_status
      description: '[check_share_job_status](https://www.dropbox.com/developers/documentation/http/documentation#sharing-check_share_job_status)


        scope: `sharing.write`


        Returns the status of an asynchronous job for sharing a folder.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"async_job_id\": \"34g93hh34h04y384084\"\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                .tag: complete
                access_type:
                  .tag: owner
                is_inside_team_folder: false
                is_team_folder: false
                name: dir
                policy:
                  acl_update_policy:
                    .tag: owner
                  shared_link_policy:
                    .tag: anyone
                  member_policy:
                    .tag: anyone
                  resolved_member_policy:
                    .tag: team
                preview_url: https://www.dropbox.com/scl/fo/fir9vjelf
                shared_folder_id: '84528192421'
                time_invited: '2016-01-20T00:00:00Z'
                path_lower: /dir
                link_metadata:
                  audience_options:
                  - .tag: public
                  - .tag: team
                  - .tag: members
                  current_audience:
                    .tag: public
                  link_permissions:
                  - action:
                      .tag: change_audience
                    allow: true
                  password_protected: false
                  url: ''
                permissions: []
                access_inheritance:
                  .tag: inherit
  /2/sharing/get_file_metadata:
    post:
      tags:
      - Sharing
      summary: Dropbox get_file_metadata
      description: '[get_file_metadata](https://www.dropbox.com/developers/documentation/http/documentation#sharing-get_file_metadata)


        scope: `sharing.read`


        Returns shared file metadata.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"file\": \"id:3kmLmQFnf1AAAAAAAAAAAw\", \n    \"actions\": []\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                id: id:3kmLmQFnf1AAAAAAAAAAAw
                name: file.txt
                policy:
                  acl_update_policy:
                    .tag: owner
                  shared_link_policy:
                    .tag: anyone
                  member_policy:
                    .tag: anyone
                  resolved_member_policy:
                    .tag: team
                preview_url: https://www.dropbox.com/scl/fi/fir9vjelf
                access_type:
                  .tag: viewer
                owner_display_names:
                - Jane Doe
                owner_team:
                  id: dbtid:AAFdgehTzw7WlXhZJsbGCLePe8RvQGYDr-I
                  name: Acme, Inc.
                path_display: /dir/file.txt
                path_lower: /dir/file.txt
                permissions: []
                time_invited: '2016-01-20T00:00:00Z'
  /2/sharing/get_file_metadata/batch:
    post:
      tags:
      - Sharing
      summary: Dropbox get_file_metadata/batch
      description: '[get_file_metadata/batch](https://www.dropbox.com/developers/documentation/http/documentation#sharing-get_file_metadata-batch)


        scope: `sharing.read`


        Returns shared file metadata.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"files\": [\n        \"id:3kmLmQFnf1AAAAAAAAAAAw\", \n        \"id:VvTaJu2VZzAAAAAAAAAADQ\"\n    ], \n    \"actions\": []\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
              - file: id:3kmLmQFnf1AAAAAAAAAAAw
                result:
                  .tag: metadata
                  id: id:3kmLmQFnf1AAAAAAAAAAAw
                  name: file.txt
                  policy:
                    acl_update_policy:
                      .tag: owner
                    shared_link_policy:
                      .tag: anyone
                    member_policy:
                      .tag: anyone
                    resolved_member_policy:
                      .tag: team
                  preview_url: https://www.dropbox.com/scl/fi/fir9vjelf
                  access_type:
                    .tag: viewer
                  owner_display_names:
                  - Jane Doe
                  owner_team:
                    id: dbtid:AAFdgehTzw7WlXhZJsbGCLePe8RvQGYDr-I
                    name: Acme, Inc.
                  path_display: /dir/file.txt
                  path_lower: /dir/file.txt
                  permissions: []
                  time_invited: '2016-01-20T00:00:00Z'
  /2/sharing/get_folder_metadata:
    post:
      tags:
      - Sharing
      summary: Dropbox get_folder_metadata
      description: '[get_folder_metadata](https://www.dropbox.com/developers/documentation/http/documentation#sharing-get_folder_metadata)


        scope: `sharing.read`


        Returns shared folder metadata by its folder ID.'
      requestBody:
        content:
          '*/*':
            schema:
