      tags:
      - Team > Member_space_limits
      summary: Dropbox member_space_limits/remove_custom_quota
      description: '[member_space_limits/remove_custom_quota](https://www.dropbox.com/developers/documentation/http/teams#team-member_space_limits-remove_custom_quota)


        scope: `members.write`


        Remove users custom quota. A maximum of 1000 members can be specified in a single call.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"users\": [\n        {\n            \".tag\": \"team_member_id\", \n            \"team_member_id\": \"dbmid:efgh5678\"\n        }\n    ]\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
              - .tag: other
  /2/team/member_space_limits/set_custom_quota:
    post:
      tags:
      - Team > Member_space_limits
      summary: Dropbox member_space_limits/set_custom_quota
      description: '[member_space_limits/set_custom_quota](https://www.dropbox.com/developers/documentation/http/teams#team-member_space_limits-set_custom_quota)


        scope: `members.read`


        Set users custom quota. Custom quota has to be at least 15GB. A maximum of 1000 members can be specified in a single call.'
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: '"{\n    \"users_and_quotas\": [\n        {\n            \"user\": {\n                \".tag\": \"team_member_id\", \n                \"team_member_id\": \"dbmid:efgh5678\"\n            }, \n            \"quota_gb\": 30\n        }\n    ]\n}"'
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            X-Dropbox-Request-Id:
              schema:
                type: integer
                example: '1234'
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
              - .tag: other
